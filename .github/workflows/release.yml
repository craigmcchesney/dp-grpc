name: Release dp-grpc

on:
  push:
    tags:
      - 'rel-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn -B package

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#rel-}" >> $GITHUB_ENV

      - name: Prepare artifacts
        run: |
          set -e
          mkdir -p release
          cp -r src/main/proto release/proto

          JAR=$(ls target/*.jar | head -n 1)
          cp "$JAR" release/dp-grpc-${VERSION}.jar

      - name: Package proto files
        run: |
          cd release
          tar czf dp-grpc-${VERSION}.tar.gz proto

      - name: Verify release artifacts exist
        run: |
          test -f release/dp-grpc-${VERSION}.tar.gz
          test -f release/dp-grpc-${VERSION}.jar

      - name: Generate checksums
        run: |
          sha256sum release/dp-grpc-${VERSION}.jar \
            > release/dp-grpc-${VERSION}.jar.sha256
          sha256sum release/dp-grpc-${VERSION}.tar.gz \
            > release/dp-grpc-${VERSION}.tar.gz.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/dp-grpc-${VERSION}.jar
            release/dp-grpc-${VERSION}.jar.sha256
            release/dp-grpc-${VERSION}.tar.gz
            release/dp-grpc-${VERSION}.tar.gz.sha256
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
