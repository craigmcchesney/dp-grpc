//
// annotation.proto
//
// Contains RPC messages and interface specific to the Annotation Service.

syntax = "proto3";

package dp.service.annotation;

option java_multiple_files = true;
option java_package = "com.ospreydcs.dp.grpc.v1.annotation";

import "common.proto";


//
// ------------------- RPC Interfaces ---------------------------
//

/*
 * Annotation Service Interface
 *
 * Interface for annotating archived data.
 */
service DpAnnotationService {

  /*
   * saveDataSet: Create or update a DataSet.
   *
   * This RPC sends a request to the annotation service to save a DataSet with the specified parameters.
   * The annotation service performs validation, and for a valid request, it performs an "upsert" (insert or update)
   * for the specified DataSet. The response may indicate rejection, an error in handling the request,
   * or successful handling of the request.
   */
  rpc saveDataSet(SaveDataSetRequest) returns (SaveDataSetResponse);

  /*
   * queryDataSets: Unary (non-streaming) data sets query.
   *
   * This RPC returns information about DataSets matching the specified query parameters. Client sends a single
   * QueryDataSetsRequest and receives a single QueryDataSetsResponse. The response may indicate rejection,
   * error in handling, no data matching query, or otherwise contains the data matching the query specification.
   */
  rpc queryDataSets(QueryDataSetsRequest) returns (QueryDataSetsResponse);

  /*
   * saveAnnotation
   *
   * This RPC sends a request to the annotation service to create or update an annotation with the
   * specified parameters. The annotation service performs validation, and for a valid request,
   * attempts to "upsert" the annotation. The response may indicate rejection, an error in handling the request,
   * or successful handling of the request.
   */
  rpc saveAnnotation(SaveAnnotationRequest) returns (SaveAnnotationResponse);

  /*
   * queryAnnotations: Unary (non-streaming) annotations query.
   *
   * This RPC is used by clients to query over annotations added to ingested data.
   * Client sends a single QueryAnnotationsRequest with the query parameters, and receives a single
   * QueryAnnotationsResponse with the query results. The response may indicate rejection, error in handling,
   * no data matching query, or otherwise contains the data matching the query specification.
   */
  rpc queryAnnotations(QueryAnnotationsRequest) returns (QueryAnnotationsResponse);

  /*
   * exportData(): Export data to common file formats.
   *
   * This RPC is used by clients to export data (both DataSets and Calculations) to file.  Client sends a single
   * ExportDataRequest specifying the details of the data to be exported and the desired output file format,
   * and receives a single response.  The response may indicate a problem handling the request, or otherwise contains
   * details about the exported file including the path and optional (if configured) URL for accessing the file.
   */
  rpc exportData(ExportDataRequest) returns (ExportDataResponse);

  /*
   * savePvMetadata()
   *
   * Create or replace the metadata record for the specified PV.
   *
   * Full replace (upsert) semantics: if a record does not exist it is created;
   * if a record already exists, ALL fields (aliases, tags, attributes,
   * description, modifiedBy) are replaced with the request contents.
   * Callers must supply the complete desired state on every call — fields
   * omitted from the request are not preserved.  Use patchPvMetadata()
   * (future) for partial updates.
   *
   * The response may indicate rejection, an error handling the request, or
   * successful handling of the request.
   */
  rpc savePvMetadata(SavePvMetadataRequest) returns (SavePvMetadataResponse);

  /*
   * queryPvMetadata()
   *
   * Query PV metadata records using structured search criteria.
   *
   * The response may indicate rejection, an error handling the request, or
   * a PvMetadataResult containing the matching records and pagination token.
   */
  rpc queryPvMetadata(QueryPvMetadataRequest) returns (QueryPvMetadataResponse);

  /*
   * getPvMetadata()
   *
   * Retrieve a single PV metadata record by canonical PV name or alias.
   * Provided as a convenience over queryPvMetadata() for the common
   * single-record lookup case.
   *
   * The response may indicate rejection, an error handling the request, or
   * a GetPvMetadataResponse containing the matching record.  If no record
   * is found for the specified name or alias, an ExceptionalResult is returned.
   */
  rpc getPvMetadata(GetPvMetadataRequest) returns (GetPvMetadataResponse);

  /*
   * patchPvMetadata()
   *
   * Partial update of an existing PV metadata record.  Allows individual
   * fields (aliases, tags, attributes, description, modifiedBy) to be updated
   * without replacing the entire record, unlike the full-replace semantics
   * of savePvMetadata().
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.  Field mask design is deferred.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard CRUD pattern for metadata APIs in this service.
   */
  rpc patchPvMetadata(PatchPvMetadataRequest) returns (PatchPvMetadataResponse);

  /*
   * deletePvMetadata()
   *
   * Delete the metadata record for the specified canonical PV name or alias.
   *
   * The response may indicate rejection, an error handling the request, or
   * a DeletePvMetadataResult confirming the name of the deleted record.
   */
  rpc deletePvMetadata(DeletePvMetadataRequest) returns (DeletePvMetadataResponse);

  /*
   * bulkSavePvMetadata()
   *
   * Bulk create or replace multiple PV metadata records in a single request.
   * Each record uses the same full-replace upsert semantics as savePvMetadata().
   * Intended for large initial imports or bulk synchronization use cases.
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard bulk-write pattern for metadata APIs in this service.
   */
  rpc bulkSavePvMetadata(BulkSavePvMetadataRequest) returns (BulkSavePvMetadataResponse);


  //
  // ------------------- Configuration Definition CRUD ---------------------------
  //

  /*
   * saveConfiguration()
   *
   * Create or replace the metadata record for the specified machine configuration.
   *
   * Full replace (upsert) semantics: if a record does not exist it is created;
   * if a record already exists, ALL fields (category, description,
   * parentConfigurationName, tags, attributes, modifiedBy) are replaced with
   * the request contents.  Callers must supply the complete desired state on
   * every call — fields omitted from the request are not preserved.
   * Use patchConfiguration() (future) for partial updates.
   *
   * The response may indicate rejection, an error handling the request, or
   * successful handling of the request.
   */
  rpc saveConfiguration(SaveConfigurationRequest) returns (SaveConfigurationResponse);

  /*
   * getConfiguration()
   *
   * Retrieve a single Configuration record by configurationName.
   * Provided as a convenience over queryConfigurations() for the common
   * single-record lookup case.
   *
   * The response may indicate rejection, an error handling the request, or
   * a GetConfigurationResult containing the matching record.  If no record
   * is found, an ExceptionalResult is returned.
   */
  rpc getConfiguration(GetConfigurationRequest) returns (GetConfigurationResponse);

  /*
   * queryConfigurations()
   *
   * Query Configuration records using structured search criteria.
   *
   * The response may indicate rejection, an error handling the request, or
   * a QueryConfigurationsResult containing the matching records and pagination token.
   */
  rpc queryConfigurations(QueryConfigurationsRequest) returns (QueryConfigurationsResponse);

  /*
   * deleteConfiguration()
   *
   * Delete the Configuration record for the specified configurationName.
   * The request is rejected if ConfigurationActivation records exist for the
   * configuration; delete associated activations first.
   *
   * The response may indicate rejection, an error handling the request, or
   * a DeleteConfigurationResult confirming the name of the deleted record.
   */
  rpc deleteConfiguration(DeleteConfigurationRequest) returns (DeleteConfigurationResponse);

  /*
   * patchConfiguration()
   *
   * Partial update of an existing Configuration record.  Allows individual
   * fields to be updated without replacing the entire record, unlike the
   * full-replace semantics of saveConfiguration().
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard CRUD pattern for metadata APIs in this service.
   */
  rpc patchConfiguration(PatchConfigurationRequest) returns (PatchConfigurationResponse);

  /*
   * bulkSaveConfiguration()
   *
   * Bulk create or replace multiple Configuration records in a single request.
   * Each record uses the same full-replace upsert semantics as saveConfiguration().
   * Intended for large initial imports or bulk synchronization use cases.
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard bulk-write pattern for metadata APIs in this service.
   */
  rpc bulkSaveConfiguration(BulkSaveConfigurationRequest) returns (BulkSaveConfigurationResponse);


  //
  // ------------------- Configuration Activation CRUD ---------------------------
  //

  /*
   * saveConfigurationActivation()
   *
   * Create or replace an activation record indicating the time interval during
   * which a Configuration was active.
   *
   * Full replace (upsert) semantics: if a record does not exist it is created;
   * if a record already exists (matched by clientActivationId, or by composite
   * key configurationName + startTime if clientActivationId is absent), ALL
   * fields are replaced with the request contents.  Callers must supply the
   * complete desired state on every call — fields omitted from the request are
   * not preserved.  Use patchConfigurationActivation() (future) for partial updates.
   *
   * To close an open-ended activation, call saveConfigurationActivation() with
   * endTime set to the desired close time.
   *
   * The response may indicate rejection, an error handling the request, or
   * successful handling of the request.
   */
  rpc saveConfigurationActivation(SaveConfigurationActivationRequest) returns (SaveConfigurationActivationResponse);

  /*
   * getConfigurationActivation()
   *
   * Retrieve a single ConfigurationActivation record by clientActivationId or
   * composite key (configurationName + startTime).
   *
   * The response may indicate rejection, an error handling the request, or
   * a GetConfigurationActivationResult containing the matching record.  If no
   * record is found, an ExceptionalResult is returned.
   */
  rpc getConfigurationActivation(GetConfigurationActivationRequest) returns (GetConfigurationActivationResponse);

  /*
   * queryConfigurationActivations()
   *
   * Query ConfigurationActivation records using structured search criteria.
   *
   * The response may indicate rejection, an error handling the request, or
   * a QueryConfigurationActivationsResult containing the matching records and
   * pagination token.
   */
  rpc queryConfigurationActivations(QueryConfigurationActivationsRequest) returns (QueryConfigurationActivationsResponse);

  /*
   * deleteConfigurationActivation()
   *
   * Delete a ConfigurationActivation record by clientActivationId or composite
   * key (configurationName + startTime).
   *
   * The response may indicate rejection, an error handling the request, or
   * a DeleteConfigurationActivationResult confirming the ID of the deleted record.
   */
  rpc deleteConfigurationActivation(DeleteConfigurationActivationRequest) returns (DeleteConfigurationActivationResponse);

  /*
   * patchConfigurationActivation()
   *
   * Partial update of an existing ConfigurationActivation record.  Allows
   * individual fields to be updated without replacing the entire record, unlike
   * the full-replace semantics of saveConfigurationActivation().
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard CRUD pattern for metadata APIs in this service.
   */
  rpc patchConfigurationActivation(PatchConfigurationActivationRequest) returns (PatchConfigurationActivationResponse);

  /*
   * bulkSaveConfigurationActivation()
   *
   * Bulk create or replace multiple ConfigurationActivation records in a single
   * request.  Each record uses the same full-replace upsert semantics as
   * saveConfigurationActivation().  Intended for bulk loading of activation
   * records from operational calendars.
   *
   * NOT YET IMPLEMENTED — calling this method returns an error response.
   * Planned for a future release.
   *
   * This method is defined now to reserve its name and message shapes as part
   * of the standard bulk-write pattern for metadata APIs in this service.
   */
  rpc bulkSaveConfigurationActivation(BulkSaveConfigurationActivationRequest) returns (BulkSaveConfigurationActivationResponse);


  //
  // ------------------- Active Configuration Query ---------------------------
  //

  /*
   * getActiveConfigurations()
   *
   * Returns all ConfigurationActivation records in effect at the specified
   * timestamp, i.e., records where:
   *   startTime <= timestamp AND (endTime is absent OR endTime > timestamp)
   *
   * timestamp is required.  Requests with an absent (zero-value) timestamp
   * are rejected with an ExceptionalResult.
   *
   * An empty result (no active configurations at the specified time) is
   * returned as a GetActiveConfigurationsResult with an empty list, not
   * an ExceptionalResult.
   */
  rpc getActiveConfigurations(GetActiveConfigurationsRequest) returns (GetActiveConfigurationsResponse);
}


//
// ------------------- DataSet / DataBlock Model ---------------------------
//

/*
 * Mechanism for identifying a set of data within the archive.  This will be used to support other features
 * such as adding annotations to data sets or exporting data sets.
 *
 * A DataSet specifies archived data across multiple DataBlocks.  Each DataBlock specifies a time range and list of
 * data sources (columns/PVs).
 *
 */
message DataSet {
  string id = 1; // Query results contain id of existing dataSet object, field is ignored when creating a new dataset via createDataSet().
  string name = 2; // required name
  string ownerId = 3; // required owner
  string description = 4; // optional textual description
  repeated DataBlock dataBlocks = 5; // required list of DataBlocks identifying data to include in DataSet.
}

message DataBlock {
  dp.service.common.Timestamp beginTime = 1; // Required, specifies beginning of time range for basis set.
  dp.service.common.Timestamp endTime = 2; // Required, specifies end of time range for basis set.
  repeated string pvNames = 3; // Required, contains list of data source names for basis set.
}


//
// ------------------- DataSet Creation Request/Response ---------------------------
//

/*
 * SaveDataSetRequest
 *
 * Contains a DataSet object to be created or updated by the handler.  If the dataSetId field in the supplied
 * DataSet object is specified, the corresponding DataSet is updated.  Otherwise, a new DataSet is create and the
 * id will be generated by the service and returned in the corresponding CreateDataSetResult.
 */
message SaveDataSetRequest {
  DataSet dataSet = 1;
}

/*
 * SaveDataSetResponse
 *
 * Contains response to saveDataSet() API request.  Message payload is exceptionalResult if request
 * is rejected or an error is encountered by the handler, otherwise contains a CreateDataSetResult.
 */
message SaveDataSetResponse {

  dp.service.common.Timestamp responseTime = 1; // Indicates time response was generated.

  // result: Contains query result payload with either ExceptionalResult or SuccessfulResult as described above.
  oneof result {
    dp.service.common.ExceptionalResult exceptionalResult = 10;
    SaveDataSetResult saveDataSetResult = 11;
  }

  /*
   * SaveDataSetResult
   *
   * Contains the results of a successful request to create or update a DataSet, with the id of the
   * corresponding new or updated DataSet.
   */
  message SaveDataSetResult {
    string dataSetId = 1;
  }
}


//
// ------------------- DataSet Query ---------------------------
//

/*
 * Query DataSet Request.
 *
 * Contains parameters for a query over existing DataSets.  A query includes a list of
 * (one or more) criteria. The criterion can be used individually or combined for compound queries.
 * E.g., a query request might use an OwnerCriterion and TextCriterion to find DataSets
 * for the specified owner matching containing the specified text.
 */
message QueryDataSetsRequest {

  repeated QueryDataSetsCriterion criteria = 1;

  message QueryDataSetsCriterion {

    oneof criterion {
      IdCriterion idCriterion = 10; // Query by DataSet id.
      OwnerCriterion ownerCriterion = 11; // Query by owner.
      TextCriterion textCriterion = 12; // Full text query over name and description fields.
      PvNameCriterion pvNameCriterion = 13; // Query by PV name.
    }

    /*
     * Criterion used to search dataset id field.  "And" operator is used to combine with other criteria.
     */
    message IdCriterion {
      string id = 1;
    }

    /*
     * Criterion used to search dataset ownerId field.  "And" operator is used to combine with other criteria.
     */
    message OwnerCriterion {
      string ownerId = 1;
    }

    /*
     * Criterion used to search dataset name and description fields.  "Or" operator is used to combine with other criteria.
     */
    message TextCriterion {
      string text = 1;
    }

    /*
     * Criterion used to search data blocks for the specified PV name.  "Or" operator is used to combine with other criteria.
     */
    message PvNameCriterion {
      string name = 1;
    }
  }
}

/*
 * Query DataSet Response.
 *
 * Contains the results of a DataSets query.  Payload is an ExceptionalResult if the request is invalid, an error is
 * encountered processing the query, or the query result is empty.  Otherwise payload is a DataSetsResult with a list
 * of DataSets matching the query parameters.
 */
message QueryDataSetsResponse {

  dp.service.common.Timestamp responseTime = 1; // Indicates time response was generated.

  // result: Response contains either an ExceptionalResult indicating a problem handling the request,
  // or DataSetsResult with query result.
  oneof result {
    dp.service.common.ExceptionalResult exceptionalResult = 10;
    DataSetsResult dataSetsResult = 11;
  }

  /*
   * Datasets Query Result Content.
   *
   * Result contains a list of DataSet messages matching the query parameters.
   */
  message DataSetsResult {
    repeated DataSet dataSets = 1;
  }
}


//
// ------------------- Calculations Model ---------------------------
//

/*
 * Calculations.
 *
 * Defines the data structure used for representing Calculations in both creating and querying Annotations.
 * To the extent possible, it parallels the data structures used in the ingestion of regular time-series data in order
 * that user-defined Calculations can be treated in a similar fashion for the purposes of querying and exporting data
 * that includes both PV data and user-defined Calculations.
 *
 * The Calculations object includes a list of CalculationsDataFrames.  Each CalculationsDataFrame includes
 * a name, a DataTimestamps object, and a list of DataColumns, each of which contains a vector of data values for a
 * single Calculation and specifies a DataValue for each timestamp specified by the corresponding DataTimestamps object.
 *
 * It might be helpful to use the analogy of an Excel workbook.  The Calculations object is the workbook, and each
 * CalculationDataFrame is a worksheet in that workbook that contains a column of timestamps and columns of calculated
 * data with a value for each timestamp.
 */
message Calculations {

  string id = 1;
  repeated CalculationsDataFrame calculationDataFrames = 2;

  message CalculationsDataFrame {
    string name = 1; // Required, name of data frame.
    dp.service.common.DataTimestamps dataTimestamps = 2; // Required, specifies timestamps for data values.
    repeated dp.service.common.DataColumn dataColumns = 3; // Required list of columns, each containing a data value for each timestamp.
  }
}

//
// ------------------- Annotation Creation Request/Response ---------------------------
//

/*
 * SaveAnnotationRequest
 *
 * A SaveAnnotationRequest message includes three required fields: ownerId (unique id of owner), dataSetIds (list of
 * unique ids of associated DataSets), and name (brief annotation name).  The optional "id" field specifies the unique id of an
 * existing annotation, if specified the corresponding existing Annotation object is updated, otherwise a new Annotation
 * is created. The request includes several optional fields used for linking to associated Annotations,
 * adding descriptive information, associating with an event / experiment, and attaching user-defined Calculations.
 *
 * The lists of associated DataSet ids and Annotation ids are an initial attempt to meet the requirement for tracking
 * data provenance.  To add Calculations that are derived from (or related to) regular PV time-series data in the
 * archive, the following steps are taken:
 *
 * - Create a DataSet that contains one or more Data Blocks that reference the PVs and time range(s) from the
 *   archive used in the calculation.
 * - Create an Annotation containing the unique id of that DataSet in the list of dataSetIds, and includes the desired
 *   Calculations.
 *
 * To add Calculations that are derived from other user-defined Calculations (that are part of another Annotation like
 * the one crated above), the following step is taken:
 *
 * - Create an Annotation containing the unique id of the Annotation that contains the original Calculations in the
 *   list of associated annotationIds, and includes the new Calculations derived from the original.
 */
message SaveAnnotationRequest {
  string id = 1; // optional unique id of existing Annotation to update
  string ownerId = 2; // required annotation owner
  repeated string dataSetIds = 3; // required list of associated datasets, might contain a single dataset
  string name = 4; // required brief name
  repeated string annotationIds = 5; // optional list of associated annotations, for provenance / linking of calculations
  string	comment = 6; // optional free-form comment text
  repeated string tags = 7; // optional list of keywords / tags for cataloging Annotation
  repeated dp.service.common.Attribute attributes = 8; // optional list of key/value attribute pairs for cataloging Annotation
  Calculations calculations = 10; // optional user-defined calculations
}

/*
 * SaveAnnotationResponse
 *
 * Contains details for response to request to create or update an Annotation.  Response includes either
 * an ExceptionalResult describing a rejection or error situation, or a SaveAnnotationResult indicating the request
 * was handled successfully.
 */
message SaveAnnotationResponse {

  dp.service.common.Timestamp responseTime = 1; // Indicates time response was generated.

  // result: Contains query result payload with either ExceptionalResult or SuccessfulResult as described above.
  oneof result {
    dp.service.common.ExceptionalResult exceptionalResult = 10;
    SaveAnnotationResult saveAnnotationResult = 11;
  }

/*
 * Successful Annotation Result.
 *
 * Contains the results of a successful request to save an annotation to a DataSet, including the id for the new
 * or updated annotation.
 */
  message SaveAnnotationResult {
    string annotationId = 1;
  }
}


//
// ------------------- Annotations Query ---------------------------
//

/*
 * Annotations Query Request.
 *
 * Contains a list of QueryAnnotationsCriterion for querying annotations. List can include a single criterion,
 * or multiple criteria for a compound query. E.g., a query request might use an OwnerCriterion and TextCriterion
 * to find annotations for the specified owner matching the text filter.
 */
message QueryAnnotationsRequest {

  repeated QueryAnnotationsCriterion criteria = 1;

  message QueryAnnotationsCriterion {

    oneof criterion {
      IdCriterion idCriterion = 10;  // Query by Annotation unique id.
      OwnerCriterion ownerCriterion = 11;  // Query by owner.
      DataSetsCriterion dataSetsCriterion = 12; // Query by unique id of associated DataSet.
      AnnotationsCriterion annotationsCriterion = 13; // Query by unique id of associated Annotation.
      TextCriterion textCriterion = 14; // Full text query over name and comment fields.
      TagsCriterion tagsCriterion = 15; // Query by tag / keyword value.
      AttributesCriterion attributesCriterion = 16; // Query attribute pairs by key and value.
    }

    /*
     * Criterion used to query annotations by id.
     */
    message IdCriterion {
      string id = 1;
    }

    /*
     * Criterion used to query annotations by owner id.
     */
    message OwnerCriterion {
      string ownerId = 1;
    }

    /*
     * Criterion used to query annotations by id of associated dataset.
     */
    message DataSetsCriterion {
      string dataSetId = 1;
    }

    /*
     * Criterion used to query annotations by id of associated annotation.
     */
    message AnnotationsCriterion {
      string annotationId = 1;
    }

    /*
     * Criterion used to query annotations by text contained in the name, comment, and eventMetadata description fields.
     */
    message TextCriterion {
      string text = 1;
    }

    /*
     * Criterion used to query annotations by tag value.
     */
    message TagsCriterion {
      string tagValue = 1;
    }

    /*
     * Criterion used to query annotations by attribute key and value.
     */
    message AttributesCriterion {
      string key = 1;
      string value = 2;
    }
  }
}

/*
 * QueryAnnotationsResponse.
 *
 * Contains results from queryAnnotations() API request.  Message payload is either ExceptionalResult indicating
 * rejection, an error handling the request, or an empty query result, otherwise contains an AnnotationsResult with
 * an entry for each Annotation matching the query criteria.
 */
message QueryAnnotationsResponse {

  dp.service.common.Timestamp responseTime = 1; // Indicates time response was generated.

  // result: Response contains either an ExceptionalResult indicating a problem handling the request,
  // or AnnotationsResult with query result.
  oneof result {
    dp.service.common.ExceptionalResult exceptionalResult = 10;
    AnnotationsResult annotationsResult = 11;
  }

  /*
   * Annotations Query Result Content.
   *
   * Result contains a list of Annotation messages, one for each annotation matching the query criteria.
   */
  message AnnotationsResult {

    repeated Annotation annotations = 1;

    message Annotation {
      string id = 1; // unique id
      string ownerId = 2; // owner unique id
      repeated string dataSetIds = 3; // list of unique ids of associated DataSets, might contain a single DataSet
      repeated DataSet dataSets = 4; // content for list of associated DataSets
      string name = 5; // brief name / description
      repeated string annotationIds = 6; // list of unique ids for associated Annotations
      string	comment = 7; // free-form comment text
      repeated string tags = 8; // list of keywords / tags
      repeated dp.service.common.Attribute attributes = 9; // list of key/value attribute pairs
      Calculations calculations = 11; // user-defined calculations
    }
  }
}


//
// ------------------- Export ---------------------------
//

/*
 * ExportDataRequest
 *
 * Used as parameter to the exportData() method.  Includes fields for specifying the id of the DataSet or
 * Calculations object to be exported, and an enum for specifying output format.  Both datasetId and calculationsSpec
 * are optional, but one or the other must be specified.
 */
message ExportDataRequest {

  string dataSetId = 1;  // Required, specifies id of DataSet to be exported.
  dp.service.common.CalculationsSpec calculationsSpec = 2; // Optional, specifies details of Calculations to include in export.
  ExportOutputFormat outputFormat = 3;  // Optional, specifies export output file format.

  enum ExportOutputFormat {
    EXPORT_FORMAT_UNSPECIFIED = 0; // Indicates no enum value has been specified, and the request will be rejected.
    EXPORT_FORMAT_HDF5 = 1; // HDF5 file containing bucketed data for multiple PVs.
    EXPORT_FORMAT_CSV = 2; // Tabular comma-separated values format.
    EXPORT_FORMAT_XLSX = 3; // Tabular Excel format.
  }
}

/*
 * ExportDataResponse
 *
 * Used as response from the exportData() method.  Payload includes either an ExceptionalResult indicating a problem
 * in handling the export request, or an ExportDataResult for a successful request.
 *
 * ExportDataResult includes fields specifying the full path for the export output file and
 * (optionally if configured) the URL for accessing the file via a web server.
 */
message ExportDataResponse {

  dp.service.common.Timestamp responseTime = 1; // Indicates time response was generated.

  oneof result {
    dp.service.common.ExceptionalResult exceptionalResult = 10; // Indicates a problem was encountered in handling the request.
    ExportDataResult exportDataResult = 11; // Indicates the request was handled successfully.
  }

  message ExportDataResult {
    string filePath = 1; // Specifies full path to export output file.
    string fileUrl = 2; // (If configured to generate URLs) Specifies URL for accessing file via web server.
  }
}


//
// ------------------- PV Metadata Save Request/Response ---------------------------
//

/*
 * SavePvMetadataRequest
 *
 * Encapsulates the details for creating or replacing the metadata record for
 * the specified PV.
 *
 * Full replace (upsert) semantics:
 *   - If no record exists for pvName, a new record is created.
 *   - If a record already exists, aliases / tags / attributes / description /
 *     modifiedBy are ALL replaced with the values in this request.
 *
 * WARNING: Fields omitted from the request are NOT preserved on update.
 * Callers must supply the complete desired state on every save.
 * patchPvMetadata() (future placeholder) will provide partial-update semantics.
 *
 * Data normalization rules applied by the service:
 *   - tags are normalized to a lowercase unique set.
 *   - attribute keys (Attribute.name) must be unique within the request;
 *     duplicate keys are rejected.
 */
message SavePvMetadataRequest {

  string pvName = 1; // required canonical PV name
  repeated string aliases = 2; // optional historical / alternate names
  repeated string tags = 3; // optional keyword tags
  repeated dp.service.common.Attribute attributes = 4; // optional key/value attribute pairs
  string modifiedBy = 5; // optional actor / user / service identity
  string description = 6; // optional free-text description
}

