//
// common.proto
//
// Contains RPC messages common to all services.

syntax = "proto3";

package dp.service.common;

option java_multiple_files = true;
option java_package = "com.ospreydcs.dp.grpc.v1.common";


//
// ------------------- Miscellaneous Definitions ---------------------------
//

/*
 * Generic key/value attribute, used as metadata to describe other objects.
 */
message Attribute {
  string name = 1;
  string value = 2;
}

/*
 * ColumnProvenance
 *
 * Describes the provenance of a data column. These fields are unconstrained and facility-specific.
 * The "source" identifies the origin of the data (e.g., an NTTable/column identifier), and the
 * "process" describes any processing applied to the source data (e.g., normalization).
 * The MLDP does not constrain, enforce, or otherwise interpret these values.
 */
message ColumnProvenance {
  string source = 1;
  string process = 2;
}

/*
 * ColumnMetadata
 *
 * Wrapper for optional column-level metadata included with an ingestion request.
 * Includes provenance information, a list of string tags, and a list of key-value attributes.
 * Overuse of bucket-level metadata will burden the ingestion server process, which is
 * optimized for continually ingesting PV time-series data.
 */
message ColumnMetadata {
  ColumnProvenance provenance = 1;
  repeated string tags = 2;
  repeated Attribute attributes = 3;
}

//
// ------------------- Time Definitions ---------------------------
//

/*
 * Time instant containing fields for seconds since epoch and nanoseconds offset.
 */
message Timestamp {
  uint64 epochSeconds = 1;  // Seconds past unix epoch - 1st january 1970.
  uint64 nanoseconds = 2;   // Nanoseconds - sub-second precision down to the nanosecond.
}

/*
 * Ordered list of Timestamp messages.
 */
message TimestampList {
  repeated Timestamp timestamps = 1;
}

/*
 * Collection of timestamps identified by sampling interval.
 *
 * Uniform sampling is assumed within sampling interval.
 * Thus, the ordered collection of timestamps are defined as a contiguous, equally-spaced point set
 * {t1, t2, ..., tN} within the following interval:
 *
 *    [startTime, (count-1)*periodNanos]
 *
 * The timestamps {t1, t2, ..., tN} are then given by
 *
 *    t1 = startTime,
 *    t2 = startTime + 1 * periodNanos,
 *    t3 = startTime + 2 * periodNanos,
 *    ...
 *    tN = startTime + (N-1) * periodNanos,
 *
 * where N = count.
 */
message SamplingClock {
  Timestamp startTime = 1; // Interval start time.
  uint64 periodNanos = 2; // Period in nanos between samples.
  uint32 count = 3; // Number of samples contained in the interval.
}

/*
 * Specifies the set of timestamps for ingested data, either using an explicit list of timestamps, or a
 * Sampling Clock specifying interval start time, sampling period, and sample count.
 */
message DataTimestamps {

  oneof value {
    SamplingClock samplingClock = 1;
    TimestampList timestampList = 2;
  }
}


//
// ------------------- Common Result Definitions ---------------------------
//

/*
 * Exceptional Method Result.
 *
 * Used to describe an exceptional result from a service method, such as a rejection or error handling request.
 * This message is used by all service RPC methods to indicate a problem executing the method.
 */
message ExceptionalResult {

  ExceptionalResultStatus exceptionalResultStatus = 1; // Enum indicating the type of exceptional result.
  string message = 2; // Message with details about the exceptional result.

  enum ExceptionalResultStatus {
    RESULT_STATUS_REJECT = 0; // Indicates request was rejected during validation.
    RESULT_STATUS_ERROR = 1; // Indicates an error was encountered in handling the request.
    RESULT_STATUS_NOT_READY = 2; // Indicates an invalid bidirectional stream query cursor operation request.
  }
}


// ------------------- Heterogeneous Column Data Types  ---------------------------
//

/*
 * DoubleColumn
 *
 * Used to contain a vector of double data values. Individual data values are visible in the database.
 */
message DoubleColumn {
  string name = 1; // PV name
  repeated double values = 2 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * FloatColumn
 *
 * Used to contain a vector of float data values. Individual data values are visible in the database.
 */
message FloatColumn {
  string name = 1; // PV name
  repeated float values = 2 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * Int64Column
 *
 * Used to contain a vector of long data values. Individual data values are visible in the database.
 */
message Int64Column {
  string name = 1; // PV name
  repeated sint64 values = 2 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * Int32Column
 *
 * Used to contain a vector of int data values. Individual data values are visible in the database.
 */
message Int32Column {
  string name = 1; // PV name
  repeated sint32 values = 2 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * BoolColumn
 *
 * Used to contain a vector of boolean data values. Individual data values are visible in the database.
 */
message BoolColumn {
  string name = 1; // PV name
  repeated bool values = 2 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * StringColumn
 *
 * Used to contain a vector of string data values. Individual data values are visible in the database.
 *
 * It is encouraged to consider the use of alternatives like EnumColumn for memory and storage efficiency reasons.
 */
message StringColumn {
  string name = 1; // PV name
  repeated string values = 2;
  ColumnMetadata metadata = 10; // optional
}

/*
 * EnumColumn
 *
 * Used to contain a vector of int enum data values. Individual data values are visible in the database.
 *
 * The enumId is user-defined and not validated by the MLDP, and is contract between data producers and consumers.
 */
message EnumColumn {
  string name = 1; // PV name
  repeated int32 values = 2 [packed = true];
  string enumId = 3; // identifier for enum semantics, e.g. "epics:alarm_status:v2"
  ColumnMetadata metadata = 10; // optional
}

/*
 * ArrayDimensions
 *
 * Specifies the dimensions for a column whose sample values are arrays.  Dimensions are a list of values for each
 * dimension up to 3.
 */
message ArrayDimensions {
  repeated uint32 dims = 1; // e.g. [1024] or [64, 64] or [32, 32, 16]
}

/*
 * DoubleArrayColumn
 *
 * Used to contain a vector of arrays of doubles, each of the specified dimensions.
 * Data values are stored in the database as an opaque blob.
 */
message DoubleArrayColumn {
  string name = 1; // PV name
  ArrayDimensions dimensions = 2;
  // Flattened: sample_count × product(dims)
  repeated double values = 3 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * FloatArrayColumn
 *
 * Used to contain a vector of arrays of floats, each of the specified dimensions.
 * Data values are stored in the database as an opaque blob.
 */
message FloatArrayColumn {
  string name = 1;
  ArrayDimensions dimensions = 2;
  repeated float values = 3 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * Int64ArrayColumn
 *
 * Used to contain a vector of arrays of longs, each of the specified dimensions.
 * Data values are stored in the database as an opaque blob.
 */
message Int64ArrayColumn {
  string name = 1;
  ArrayDimensions dimensions = 2;
  repeated sint64 values = 3 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * Int32ArrayColumn
 *
 * Used to contain a vector of arrays of ints, each of the specified dimensions.
 * Data values are stored in the database as an opaque blob.
 */
message Int32ArrayColumn {
  string name = 1;
  ArrayDimensions dimensions = 2;
  repeated sint32 values = 3 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * BoolArrayColumn
 *
 * Used to contain a vector of arrays of booleans, each of the specified dimensions.
 * Data values are stored in the database as an opaque blob.
 */
message BoolArrayColumn {
  string name = 1;
  ArrayDimensions dimensions = 2;
  repeated bool values = 3 [packed = true];
  ColumnMetadata metadata = 10; // optional
}

/*
 * ImageDescriptor
 *
 * Specifies the details for an image including width, height, number of channels, and a user-defined encoding specifying
 * the image format that a contract between data producer and consumer.
 */
message ImageDescriptor {
  uint32 width = 1;
  uint32 height = 2;
  uint32 channels = 3; // e.g. 1 (mono), 3 (RGB)
  string encoding = 4; // e.g. "raw", "png", "jpeg"
}

/*
 * ImageColumn
 *
 * Used to contain a vector of image data values. Each image is a byte string, encoded according to imageDescriptor.
 * Data values are stored in the database as an opaque blob.
 */
message ImageColumn {
  string name = 1;
  ImageDescriptor imageDescriptor = 2;
  // One image per sample
  repeated bytes images = 3;
  ColumnMetadata metadata = 10; // optional
}

/*
 * StructColumn
 *
 * Used to contain a vector of structure data values. Each structure's content is serialized to byte string format.
 * The user-defined schemaId specifies the encoding for the structure, and is a contract between data producer and
 * consumer.
 */
message StructColumn {
  string name = 1;
  string schemaId = 2; // e.g. "beam_position:v3"
  // One struct per sample
  repeated bytes values = 3;
  ColumnMetadata metadata = 10; // optional
}

/*
 * SerializedDataColumn
 *
 * This "catch all" column contains the entire vector of data values as a single byte string. The user-defined
 * encoding specifies the format of the byte content, and is a contract between data producer and consumer.
 */
message SerializedDataColumn {
  string name = 1;
  string encoding = 2; // e.g. "Image:v1", "Struct:BeamPosition:v2", "proto:Image".
  bytes payload = 3;
  ColumnMetadata metadata = 10; // optional
}

/*
 * Data Column
 *
 * Contains a named vector of heterogeneous data values sampled for a particular PV.
 *
 * NOTE: Use of this type for ingestion is deprecated, and may be removed in the next API version. Handling of
 * DataColumns in ingestion causes per-sample memory allocation that is inefficient. Data values are stored in the
 * database as a single opaque blob, even for scalar-valued columns. Consider using one of the above column-oriented
 * data structures for ingestion efficiency.
 *
 */
message DataColumn {
  string name = 1; // Name of PV.
  repeated DataValue dataValues = 2; // List of heterogeneous column data values.
  ColumnMetadata metadata = 10; // optional
}

/*
 * Unit of Heterogeneous Data
 *
 * The message includes both a data field 'value' and a status field 'valueStatus'.
 * The 'value' field is the actual data value while the 'valueStatus' field represents the
 * condition of the value (i.e., typically at acquisition time).  Future versions may include
 * the status of the value within the archive (e.g., corrupt, truncated, etc.).
 *
 * The field 'value' is a union of all possible data types currently supported.  It represents one
 * unit of heterogeneous data.  Only one data type may be included in the message.
 *
 * The 'valueStatus' field is structure defined as an enclosed RPC message.  It contains information about the
 * value during acquisition, such as value alarm conditions, acquisition conditions, and any associated
 * message.  This field is subject to future modification for expanded use cases.
 *
 * NOTE: Use of this type for ingestion is deprecated, and may be removed in the next API version. Handling of
 * DataValue in ingestion causes per-sample memory allocation that is inefficient. Also, the ValueStatus mechanismk
 * is useful for capturing status information from the control system, but not for automated cleaning tools that must
 * update value status information post-ingestion.
 */
message DataValue {

  /*
   * Heterogeneous Data Value
   */
  oneof value {
    string		stringValue = 1;		// character string
    bool		booleanValue = 2;		// logical Boolean
    uint32		uintValue = 3;			// unsigned integer value
    uint64		ulongValue = 4;			// unsigned long integer
    sint32		intValue = 5;			// signed integer value
    sint64		longValue = 6;			// signed long integer
    float		floatValue = 7;			// 32 byte float value
    double		doubleValue = 8;		// 64 byte float value (double)
    bytes		byteArrayValue = 9;		// raw data as byte string
    Array		arrayValue = 10;			// heterogeneous array (no dimensional restrictions as of yet)
    Structure	structureValue = 11;		// general data structure (no width or depth restrictions yet)
    Image		imageValue = 12;		// general image value
    Timestamp timestampValue = 13; // timestamp data value
  }

  /*
   * Status of Value
   *
   * Represents the condition of the value or associated hardware and software at
   * acquisition time.
   */
  ValueStatus valueStatus = 15;

  /*
   * Status of data value.
   *
   * The status definition reflects the value at acquisition time
   * (e.g., as in the EPIC record fields).
   */
  message ValueStatus {

    string message = 1;
    StatusCode statusCode = 2;
    Severity severity = 3;

    /*
     * Source of an Exceptional Status
     */
    enum StatusCode {
      NO_STATUS = 0;		// no status condition
      DEVICE_STATUS = 1;	// hardware device condition
      DRIVER_STATUS = 2;	// hardware driver condition
      RECORD_STATUS = 3;	// device database record condition
      DB_STATUS = 4; 		// device database condition
      CONF_STATUS = 5;		// configuration condition
      UNDEFINED_STATUS = 6;	// unknown or undefined status condition
      CLIENT_STATUS = 7;	// data provider client condition
    }

    /*
     * Value Alarm
     *
     * Pre-configured alarm conditions triggered by current data value.
     */
    enum Severity {
      NO_ALARM = 0;			// no alarm conditions
      MINOR_ALARM = 1;		// value has triggered a minor alarm condition
      MAJOR_ALARM = 2;		// value has triggered a major alarm condition
      INVALID_ALARM = 3;	// value has triggered an invalid alarm condition
      UNDEFINED_ALARM = 4;	// unknown or undefined alarm condition present
    }
  }
}

/*
 * Structure Data Value.
 *
 * Represents a unit of data whose value is a structure.
 *
 * Each level of a data structure may have an indefinite number of fields consisting
 * of (name, value) pairs.
 *
 * Note that the Structure message supports nested structure, and thus, complex data structures
 * can be represented.  The 'value' field within a (name, value) pair may contain another Structure
 * message supporting multi-level structuring.  The depth of the structuring is currently indefinite
 * but may have practical restrictions within service implementation (yet unreported).
 *
 * NOTE: Use of this type for ingestion is deprecated and will probably be removed in the next API version.
 * Consider using StructColumn instead.
 */
message Structure {

  repeated Field fields = 1;

  message Field {
    string name = 1;
    DataValue value = 2;
  }
}

/*
 * Array Data Value.
 *
 * Represents a unit of data whose value is an array.
 *
 * Used for vectors whose values are arrays instead of individual scalar values.  Data values are any of the defined
 * DataValue types including simple scalars as well as more complex types like structures, images, and other nested
 * arrays.  The depth of array nesting is currently indefinite but may have practical restrictions within service
 * implementation (yet unreported).
 *
 * NOTE: Use of this type for ingestion is deprecated and will probably be removed in the next API version.
 * Consider using one of the array column types instead.
 */
message Array {
  repeated DataValue dataValues = 1; // List of array data values.
}

/*
 * Image Data Value.
 *
 * Represents a unit of data whose value is an image file.
 *
 * Images are stored as raw data as a byte vector.  Interpretation is determined by standard
 * image file formats enumerated by FileType.
 *
 * Note: Use of this type for ingestion is deprecated and will probably be removed in the next API version.
 * Consider using ImageColumn instead.
 */
message Image {

  bytes image = 1;
  FileType fileType = 2;

  /*
   * Image file format.  Also used as file extension.
   */
  enum FileType {
    RAW = 0;
    JPEG = 1;
    GIF = 2;
    TIFF = 3;
    BMP = 4;
    PNG = 5;
    EPS = 6;
    SVG = 7;
    PDF = 8;
  }
}


// ------------------- Common support for streaming data ---------------------------

/*
 * DataFrame
 *
 * A DataFrame contains lists of heterogeneous data column messages, and a DataTimestamps message specifying the timestamps for
 * those columns.  Each list of columns is optimized for handling a specific data type.  Each column contains a data
 * value for each timestamp in dataTimestamps.
 *
 * DataTimestamps can be expressed using either a SamplingClock with start time, sample period,
 * and sample count, or using a TimestampsList with an explicit list of timestamps for the data values.
 */
message DataFrame {

  dp.service.common.DataTimestamps dataTimestamps = 1; // Required, specifies timestamps for data values.

  repeated dp.service.common.DataColumn dataColumns = 2; // Deprecated legacy column type, support may be removed in the next API version.

  repeated dp.service.common.SerializedDataColumn serializedDataColumns = 3;

  repeated dp.service.common.DoubleColumn doubleColumns = 10;
  repeated dp.service.common.FloatColumn  floatColumns  = 11;
  repeated dp.service.common.Int64Column  int64Columns  = 12;
  repeated dp.service.common.Int32Column  int32Columns  = 13;
  repeated dp.service.common.BoolColumn   boolColumns   = 14;
  repeated dp.service.common.StringColumn stringColumns = 15;
  repeated dp.service.common.EnumColumn   enumColumns   = 16;
  repeated dp.service.common.ImageColumn  imageColumns  = 17;
  repeated dp.service.common.StructColumn structColumns = 18;

  repeated dp.service.common.DoubleArrayColumn doubleArrayColumns = 20;
  repeated dp.service.common.FloatArrayColumn floatArrayColumns = 21;
  repeated dp.service.common.Int32ArrayColumn int32ArrayColumns = 22;
  repeated dp.service.common.Int64ArrayColumn int64ArrayColumns = 23;
  repeated dp.service.common.BoolArrayColumn boolArrayColumns = 24;
}

/*
 * DataBucket
 *
 * Contains bucketed time-series data for a PV over a time period as specified in the dataTimestamps. Includes
 * a DataTimestamps message specifying the timestamps for the individual data values, and a heterogeneous column
 * message containing the vector of data values with one value per timestamp.
 */
message DataBucket {
  string pvName = 1; // Name of PV for data column.
  DataTimestamps dataTimestamps = 2; // Specifies timestamps for bucket, using SamplingClock or explicit Timestamp list.
  string providerId = 3; // unique id of provider from most recent ingestion request.
  string providerName = 4; // name of provider from most recent ingestion request.
  DataValues dataValues = 5;
}

message DataValues {
  oneof values {

    DataColumn dataColumn = 10;
    SerializedDataColumn serializedDataColumn = 11;

    DoubleColumn doubleColumn = 12;
    FloatColumn  floatColumn  = 13;
    Int64Column  int64Column  = 14;
    Int32Column  int32Column  = 15;
    BoolColumn   boolColumn   = 16;
    StringColumn stringColumn = 17;
    EnumColumn   enumColumn   = 18;

    ImageColumn  imageColumn  = 19;
    StructColumn structColumn = 20;

    DoubleArrayColumn doubleArrayColumn = 30;
    FloatArrayColumn floatArrayColumn = 31;
    Int32ArrayColumn int32ArrayColumn = 32;
    Int64ArrayColumn int64ArrayColumn = 33;
    BoolArrayColumn boolArrayColumn = 34;
  }
}


// ------------------- Common support for using calculations ---------------------------
//

/*
 * CalculationsSpec
 *
 * Provides a mechanism for using Annotation Calculations in APIs for export and query etc.
 */
message CalculationsSpec {

  string calculationsId = 1; // Required, specifies unique id of Calculations object to include in the result.

  // dataFrameColumns: Optional, map of CalculationsDataFrame name to the columns in that frame to include in the result.
  map<string, ColumnNameList> dataFrameColumns = 2;

  message ColumnNameList {
    /*
     * Defining list of strings as a data type that can be used as the value in a map, since we can't use
     * "repeated string" directly.
     */
    repeated string columnNames = 1;
  }
}

