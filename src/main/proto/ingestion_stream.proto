//
// ingestion.proto
//
// Contains methods and data types specific to the Ingestion Service.

syntax = "proto3";

package dp.service.ingestionstream;

option java_multiple_files = true;
option java_package = "com.ospreydcs.dp.grpc.v1.ingestionstream";

import "common.proto";


//
// ------------------- RPC Interfaces ---------------------------
//

/*
 * The Ingestion Stream Service Interface
 *
 * Defines RPC operations for processing of the ingestion data stream.
 *
 */
service DpIngestionStreamService {

  /*
    * subscribeDataEvent()
    *
    * This method allows the client to register a subscription for a data event, and receive notification when new data
    * is received by the Ingestion Service that triggers the specified event.  The method uses bidirectional streaming,
    * where the client sends a stream of SubscribeDataEventRequest messages and receives a stream of
    * SubscribeDataEventResponse messages in the response stream.
    *
    * To initiate a new subscription, the client sends a SubscribeDataEventRequest message with a NewSubscription
    * payload specifying the details for the data event to be monitored.
    *
    * The service responds with a single SubscribeDataEventResponse message, containing either an ExceptionalResult
    * message payload if the request is rejected by the service or an AckResult message if the service accepts the
    * request and registers the subscription.
    *
    * The service then sends a stream of SubscribeDataEventResponse messages, each containing either Event or EventData
    * message payloads.
    *
    * There are two mechanisms for canceling a data event subscription. To explicitly cancel a subscription, the client
    * sends a SubscribeDataEventRequest message containing a CancelSubscription message payload.  The client can also
    * implicitly cancel a subscription by simply closing the API method request stream.
    *
    * The service sends a response with an ExceptionalResult payload if it rejects the subscription request or an error
    * occurs while handling the subscription.  In either case, after sending the ExceptionalResult message the service
    * closes the API method response stream.
    */
  rpc subscribeDataEvent(stream SubscribeDataEventRequest) returns (stream SubscribeDataEventResponse);

}


//
// ------------------- Ingestion Stream Data Event Monitoring ---------------------------
//

/*
 * SubscribeDataEventRequest
 *
 * The client sends SubscribeDataEventRequest messages in the request stream for the subscribeDataEvent() API method.
 * Each message can contain one of two message payloads, either a NewSubscription message or a CancelSubscription message.
 *
 * The NewSubscription message contains a list of PVConditionTrigger messages (triggers) and a
 * DataEventOperation (operation) message.
 *
 * Each PvConditionTrigger specifies a PV name, a condition (e.g., equal to, greater than, less than, etc.),
 * and a trigger data value.  When the condition is triggered by data in the ingestion stream for the specified PV,
 * the client receives an Event notification that specifies the event time, condition that was triggered,
 * and the data value that triggered the event.
 *
 * The DataEventOperation parameter is used to optionally register to receive EventData for a list of PVs
 * when an Event is triggered for a window of time offset from the event trigger time.  This message includes
 * a list of target PVs (targetPVs) and a DataEventWindow message that specifies the window of time
 * (as a time interval offset from the triggered event time).  When an event is triggered for
 * one of the subscription's PvConditionTriggers, EventData messages are sent in the response stream
 * containing DataBuckets for the list of PVs and time interval specified in the DataEventOperation.
 *
 * The CancelSubscription message is an empty message that simply indicates the client wishes to end the subscription.
 */
message SubscribeDataEventRequest {

  oneof request {
    NewSubscription newSubscription = 10;
    CancelSubscription cancelSubscription = 11;
  }

  message NewSubscription {
    repeated PvConditionTrigger triggers = 1;
    DataEventOperation operation = 2;
  }

  message CancelSubscription {
    // empty message sent to cancel subscription
  }
}

/*
 * SubscribeDataEventResponse
 *
 * The service sends SubscribeDataEventResponse messages in the response stream for the subscribeDataEvent() method.
 * Each response contains one of three payload messages.  1) An ExceptionalResult payload is sent if the service
 * rejects the subscription request or an error occurs while processing the subscription. 2) An AckResult payload
 * is sent when the service accepts a subscription request. 3) A Event payload is sent each time the condition is met
 * for one of the subscription's PvConditionTriggers. 4) When an Event is triggered for a subscription, messages with
 * EventData payloads are sent for the specified list of PV names and time interval in the subscription's
 * DataEventOperation parameter.
 *
 * When one of the conditions for a subscription is triggered by data in the ingestion stream for the specified PV,
 * the client receives an Event notification that specifies the event time, condition that was triggered,
 * and the data value that triggered the event.
 *
 * When an event is triggered for one of the subscription's PvConditionTriggers, EventData messages are sent
 * in the response stream containing DataBuckets for the list of PVs and time interval specified in the
 * DataEventOperation.
 *
 * Each DataBucket includes a column vector of data for a PV matching the subscription in the column format used in
 * ingestion for that PV.
 */
message SubscribeDataEventResponse {

  Timestamp responseTime = 1; // Indicates time response is generated.

  oneof result {
    ExceptionalResult exceptionalResult = 10;
    AckResult ack = 11;
    Event event = 12;
    EventData eventData = 13;
  }

  message AckResult {
    // empty message sent to confirm subscription
  }

  message Event {
    Timestamp eventTime = 1;
    PvConditionTrigger trigger = 2;
    DataValue dataValue = 3;
  }

  message EventData {
    Event event = 1;
    repeated DataBucket dataBuckets = 2;
  }
}

/*
 * PvConditionTrigger
 *
 * Each PvConditionTrigger specifies a PV name, a condition (e.g., equal to, greater than, less than, etc.),
 * and a trigger data value.  When the condition is triggered by data in the ingestion stream for the specified PV,
 * the client receives an Event notification that specifies the event time, condition that was triggered, and the
 * data value that triggered the event.
 */
message PvConditionTrigger {

  string pvName = 1;
  PvCondition condition= 2;
  DataValue value = 3;

  enum PvCondition {
    PV_CONDITION_UNSPECIFIED = 0;
    PV_CONDITION_EQUAL_TO = 1;
    PV_CONDITION_GREATER = 2;
    PV_CONDITION_GREATER_EQ = 3;
    PV_CONDITION_LESS = 4;
    PV_CONDITION_LESS_EQ = 5;
  }
}

/*
 * The DataEventOperation parameter is used to optionally register to receive EventData for a list of PVs
 * when an Event is triggered for a window of time offset from the event trigger time.  This message includes
 * a list of target PVs (targetPVs) and a DataEventWindow message that specifies the window of time
 * (as a time interval offset from the triggered event time).  When an event is triggered for one of
 * the subscription's PvConditionTriggers, EventData messages are sent in the response stream containing DataBuckets
 * for the list of PVs and time interval specified in the DataEventOperation.
 */
message DataEventOperation {

  DataEventWindow window = 1;
  repeated string targetPvs = 2;

  // Process operation = 3;  // Support may be added for a field specifying additional processing to perform,
  // beyond just returning data for the specified PVs.

  /*
   * Currently only type TimeInterval is supported by DataEventWindow. Support for a 'SampleCount' type may be added
   * where we specify the number of values to send for a PV starting from a time specified as an offset from the
   * triggered event time.
   */
  message DataEventWindow {

    oneof type {
      TimeInterval timeInterval = 10;
      //        SampleCount sampleCount = 11;
    }

    message TimeInterval {
      int64 offset = 1;  // offset from trigger time in nanoseconds (negative value means before trigger time)
      uint64 duration = 2; // number of nanoseconds of data to capture from trigger time modified by offset
    }

    // SampleCount is not supported yet since it's not clear how it should work when there are multiple PVs with
    // different timescales.
    //      message SampleCount {
    //        int64 offset = 1; // offset from trigger time in nanoseconds (negative value means before trigger time)
    //        uint32 size = 2; // number of data values to capture from trigger time modified by offset
    //      }
  }
}

